name: Production Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  RESOURCE_GROUP: paultrades_live
  ACR_NAME: acrecomsite
  ACR_LOGIN_SERVER: acrecomsite.azurecr.io
  BACKEND_APP_NAME: paultrades-ecom-live-backend-2604171839
  FRONTEND_APP_NAME: paultrades-ecom-live-frontend-2604171839

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push backend image
        run: |
          docker build -f deployment/backend.Dockerfile \
            -t $ACR_LOGIN_SERVER/ecom-backend:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/ecom-backend:latest \
            .
          docker push $ACR_LOGIN_SERVER/ecom-backend:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/ecom-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -f deployment/frontend.Dockerfile \
            --build-arg REACT_APP_API_URL=/api \
            --build-arg PACKAGE_OPTION=prod \
            -t $ACR_LOGIN_SERVER/ecom-frontend:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/ecom-frontend:latest \
            .
          docker push $ACR_LOGIN_SERVER/ecom-frontend:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/ecom-frontend:latest

      - name: Deploy backend container
        run: |
          az webapp config container set \
            --resource-group $RESOURCE_GROUP \
            --name $BACKEND_APP_NAME \
            --docker-custom-image-name $ACR_LOGIN_SERVER/ecom-backend:$IMAGE_TAG \
            --docker-registry-server-url https://$ACR_LOGIN_SERVER

      - name: Deploy frontend container
        run: |
          az webapp config container set \
            --resource-group $RESOURCE_GROUP \
            --name $FRONTEND_APP_NAME \
            --docker-custom-image-name $ACR_LOGIN_SERVER/ecom-frontend:$IMAGE_TAG \
            --docker-registry-server-url https://$ACR_LOGIN_SERVER

      - name: Enforce web app ports
        run: |
          az webapp config appsettings set \
            --resource-group $RESOURCE_GROUP \
            --name $BACKEND_APP_NAME \
            --settings WEBSITES_PORT=8000
          az webapp config appsettings set \
            --resource-group $RESOURCE_GROUP \
            --name $FRONTEND_APP_NAME \
            --settings WEBSITES_PORT=8080

      - name: Deployment summary
        run: |
          echo "Backend: https://$BACKEND_APP_NAME.azurewebsites.net"
          echo "Frontend: https://$FRONTEND_APP_NAME.azurewebsites.net"
