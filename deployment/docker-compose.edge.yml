services:
  edge:
    image: caddy:2-alpine
    container_name: econsite-edge
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
    name: econsite_caddy_data
  caddy_config:
    name: econsite_caddy_config